# Profil dev : développement local et Docker
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:clubdb}?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Crée/met à jour le schéma automatiquement (MySQL vide au premier démarrage Docker)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

logging.level.com.club=DEBUG
logging.level.org.springframework.security=INFO
