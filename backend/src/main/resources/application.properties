# Profil actif (dev par défaut ; Docker : SPRING_PROFILES_ACTIVE=dev via .env)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# HTTP request/response encoding (JSON API)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true

# JPA (commun)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=${SERVER_PORT:8084}
server.servlet.context-path=/api

# JWT
jwt.secret=${JWT_SECRET:clubFootSecretKeyForJWTTokenGenerationSecure2024VeryLongSecret}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Multipart (uploads)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# Erreurs HTTP
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Migration mots de passe
app.security.migrate-plain-passwords=true

# Sécurité web (CORS, rate limit)
app.security.cors-allowed-origins=http://localhost:*,http://127.0.0.1:*,http://10.0.2.2:*
app.security.auth-rate-limit-max=30
app.security.auth-rate-limit-window-seconds=60

# Logging (niveaux détaillés dans application-dev.properties)
logging.level.com.club=INFO
logging.level.org.springframework.security=WARN
