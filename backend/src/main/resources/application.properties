# Database Configuration (UTF-8 required for accented characters: Fès, Réserve, etc.)
spring.datasource.url=jdbc:mysql://localhost:3306/clubdb?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HTTP request/response encoding (JSON API)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8084
server.servlet.context-path=/api

# JWT Configuration
jwt.secret=clubFootSecretKeyForJWTTokenGenerationSecure2024VeryLongSecret
jwt.expiration=86400000

# Multipart Configuration (for file uploads)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Fichiers utilisateurs (dossiers par userId / type de document)
app.upload.dir=uploads

# Ne pas exposer les détails d'erreur HTTP (stack traces, messages SQL, etc.)
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Migration : hasher les mots de passe en clair au démarrage
app.security.migrate-plain-passwords=true

# Sécurité web (CORS, rate limit auth)
app.security.cors-allowed-origins=http://localhost:*,http://127.0.0.1:*,http://10.0.2.2:*
app.security.auth-rate-limit-max=30
app.security.auth-rate-limit-window-seconds=60

# Logging
logging.level.com.club=INFO
logging.level.org.springframework.security=WARN