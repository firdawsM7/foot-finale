name: club_mobile
description: Club Foot Mobile App
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & API
  http: ^1.1.0
  stomp_dart_client: ^1.0.0
  
  
  # State Management
  provider: ^6.1.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Navigation
  go_router: ^13.0.0
  
  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  
  # Utils
  intl: ^0.19.0
  flutter_spinkit: ^5.2.0
  fl_chart: ^0.66.0
  
  # New for Document Management
  file_picker: ^8.0.0
  flutter_pdfview: ^1.3.2
  open_file: ^3.3.0
  http_parser: ^4.0.2
  url_launcher: ^6.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1